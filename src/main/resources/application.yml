#공통설정
spring:
  application:
    name: discodeit
  datasource:
    driver-class-name: org.postgresql.Driver
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: info

discodeit:
  storage:
    type: local
    local:
      root-path: ./uploads